# Event Radar — Source Configuration
# Curated sources crawled via Crawl4AI + 13F hedge fund registry.
# Structured APIs (FRED macro, NASDAQ earnings) are configured in crawler.py.
# Surprise detection queries are in core/constants/events.py.

# -- Curated Sources --
# Crawled on schedule via Crawl4AI for calendar event extraction.
curated_sources:

  # ── Major Tech Conferences ─────────────────────────────
  - name: "CES Calendar"
    url: "https://www.ces.tech/schedule"
    category: conference
    region: US
    frequency: weekly
    tickers: []

  - name: "Apple WWDC"
    url: "https://developer.apple.com/wwdc/"
    category: conference
    region: US
    frequency: weekly
    tickers: ["AAPL"]

  - name: "Computex"
    url: "https://www.computextaipei.com.tw/en/"
    category: conference
    region: global
    frequency: weekly
    tickers: ["TSM", "NVDA", "AMD"]

  - name: "AWS re:Invent"
    url: "https://reinvent.awsevents.com/"
    category: conference
    region: US
    frequency: weekly
    tickers: ["AMZN"]

  - name: "Google I/O"
    url: "https://io.google/"
    category: conference
    region: US
    frequency: weekly
    tickers: ["GOOG"]

  # ── Semiconductors & AI Infra Conferences ───────────────
  - name: "NVIDIA GTC"
    url: "https://www.nvidia.com/gtc/"
    category: conference
    region: US
    frequency: weekly
    tickers: ["NVDA"]

  - name: "SEMI Events"
    url: "https://www.semi.org/en/connect/events"
    category: conference
    region: global
    frequency: weekly
    tickers: []

  - name: "SEMICON West"
    url: "https://www.semi.org/en/connect/events/semicon-west"
    category: conference
    region: US
    frequency: weekly
    tickers: ["LRCX", "AMAT", "KLAC"]

  - name: "Hot Chips"
    url: "https://hotchips.org/"
    category: conference
    region: US
    frequency: weekly
    tickers: []

  - name: "OFC Conference"
    url: "https://www.ofcconference.org/"
    category: conference
    region: US
    frequency: weekly
    tickers: ["COHR", "LITE", "CIEN"]

  # ── Central Banks ──────────────────────────────────────
  - name: "Fed FOMC Calendar"
    url: "https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm"
    category: fed
    region: US
    frequency: monthly
    tickers: []

